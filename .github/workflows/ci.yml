name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · tests · build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint:check
        # TODO: enable --max-warnings=0 once existing warnings are resolved
        continue-on-error: true

      - name: Type check (tsc)
        run: npm run typecheck
        # TODO: enforce once pre-existing type errors are resolved (~115 errors)
        continue-on-error: true

      - name: Unit tests (Vitest)
        run: node node_modules/vitest/vitest.mjs run

      - name: Build
        run: npm run build

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (style · static analysis · tests)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, curl, gd, intl, mbstring, mysql, pdo, xml, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env && php artisan key:generate

      - name: Code style (PHP CS Fixer)
        run: composer cs:check
        continue-on-error: true

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Tests (PHPUnit)
        run: vendor/bin/phpunit --no-coverage
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
